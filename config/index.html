<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="Haunted - Bio Page" />
  <meta property="og:description" content="Created By Haunted" />
  <meta property="og:image" content="https://cdn.discordapp.com/attachments/1478058925151486003/1478227683648340061/3E9XLC4.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>@ A</title>
  <link rel="icon" type="image/png" href="/star.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-image: url('/bgs/snow.png');
      --bg-image-dark: url('/bgs/snow-dark.png'); /* ← swap this path for your dark bg */
      --overlay-bg: rgba(10, 10, 10, 0.88);
      --overlay-text: #ececec;

      --glass-bg: rgba(255, 255, 255, 0.40);
      --glass-border: rgba(255, 255, 255, 0.56);
      --glass-highlight: rgba(255, 255, 255, 0.26);
      --glass-shadow: 0 24px 60px rgba(0,0,0,0.16), 0 1px 0 rgba(255,255,255,0.38) inset;

      --text-primary: #232323;
      --text-secondary: rgba(55, 55, 55, 0.72);
      --text-soft: rgba(85, 85, 85, 0.58);

      --icon-bg: rgba(30, 30, 30, 0.88);
      --icon-color: #fff;

      --button-bg: rgba(255, 255, 255, 0.52);
      --button-border: rgba(255, 255, 255, 0.60);
      --button-color: #2f2f2f;
      --button-shadow: 0 12px 28px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.44) inset;

      --progress-track: rgba(0, 0, 0, 0.12);
      --progress-fill: rgba(38, 38, 38, 0.82);
      --card-radius: 34px;
      --player-radius: 24px;

      --bio-divider: rgba(0,0,0,0.10);
      --bio-tag-bg: rgba(0,0,0,0.06);
      --bio-tag-border: rgba(0,0,0,0.10);
      --bio-tag-color: rgba(40,40,40,0.70);
      --bio-quote-color: rgba(0,0,0,0.08);
    }

    html[data-theme="dark"] {
      --overlay-bg: rgba(0, 0, 0, 0.60);
      --overlay-text: #f4f4f4;
      --glass-bg: rgba(18, 18, 18, 0.46);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-highlight: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 24px 60px rgba(0,0,0,0.32), 0 1px 0 rgba(255,255,255,0.08) inset;

      --text-primary: rgba(245, 245, 245, 0.92);
      --text-secondary: rgba(235, 235, 235, 0.66);
      --text-soft: rgba(235, 235, 235, 0.48);

      --icon-bg: rgba(245, 245, 245, 0.92);
      --icon-color: #111;

      --button-bg: rgba(245, 245, 245, 0.84);
      --button-border: rgba(255, 255, 255, 0.22);
      --button-color: #202020;
      --button-shadow: 0 12px 28px rgba(0,0,0,0.20), 0 1px 0 rgba(255,255,255,0.10) inset;

      --progress-track: rgba(255, 255, 255, 0.15);
      --progress-fill: rgba(245, 245, 245, 0.88);

      --bio-divider: rgba(255,255,255,0.10);
      --bio-tag-bg: rgba(255,255,255,0.07);
      --bio-tag-border: rgba(255,255,255,0.12);
      --bio-tag-color: rgba(220,220,220,0.60);
      --bio-quote-color: rgba(255,255,255,0.07);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #a9a9a9;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg-image) center/cover no-repeat fixed;
      position: relative;
      transition: background-image .5s ease;
    }
    html[data-theme="dark"] body {
      background-image: var(--bg-image-dark);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 24%, rgba(255,255,255,.16), transparent 22%),
        radial-gradient(circle at 74% 19%, rgba(255,255,255,.10), transparent 23%),
        radial-gradient(circle at 68% 75%, rgba(255,255,255,.09), transparent 25%),
        radial-gradient(circle at 30% 78%, rgba(255,255,255,.08), transparent 25%),
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.05));
      mix-blend-mode: screen;
      opacity: .95;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.14) 100%);
      z-index: 0;
    }

    #snow-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Corner buttons ── */
    .corner-btn {
      position: fixed;
      z-index: 50;
      width: 46px;
      height: 46px;
      border-radius: 16px;
      border: 1px solid var(--button-border);
      background: var(--button-bg);
      box-shadow: var(--button-shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: grid;
      place-items: center;
      color: var(--button-color);
      transition: transform .18s ease, opacity .18s ease;
    }
    .corner-btn:hover { transform: translateY(-1px) scale(1.06); opacity: .96; }
    #vol-btn { top: 16px; left: 16px; }
    #theme-btn { bottom: 16px; right: 16px; }
    .corner-btn svg { width: 20px; height: 20px; fill: currentColor; display: block; }

    /* ── Overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--overlay-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--overlay-text);
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: lowercase;
      opacity: 1;
      transition: opacity .45s ease, visibility .45s ease;
      user-select: none;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }

    /* ── Card wrap ── */
    #card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 10;
      padding: 20px;
      animation: riseIn .8s cubic-bezier(.2,.8,.2,1) both;
      --mx: 50%;
      --my: 50%;
    }

    #card-wrap::after {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 40px;
      pointer-events: none;
      background: radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,0.10), transparent 34%);
      opacity: .9;
      filter: blur(10px);
      z-index: -1;
      transition: opacity .2s ease;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: perspective(1100px) translateY(12px) scale(.985); }
      to   { opacity: 1; transform: perspective(1100px) translateY(0) scale(1); }
    }

    /* ── Profile card ── */
    .profile-box {
      width: min(660px, calc(100vw - 32px));
      border-radius: var(--card-radius);
      padding: 42px 72px 60px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      text-align: center;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(18px) saturate(1.10);
      -webkit-backdrop-filter: blur(18px) saturate(1.10);
    }
    .profile-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, var(--glass-highlight), rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.02)),
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.20), transparent 36%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.08), transparent 45%);
      pointer-events: none;
      z-index: 0;
    }
    .profile-box::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent 30%, transparent 70%, rgba(255,255,255,0.10));
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Profile pic ── */
    .profile-pic-wrapper {
      width: 126px;
      height: 126px;
      margin: 0 auto 18px;
      position: relative;
      z-index: 1;
    }
    .profile-pic {
      width: 126px;
      height: 126px;
      display: block;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.80);
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      filter: grayscale(80%) contrast(1.03) brightness(1.03);
    }
    .profile-pic-decoration {
      position: absolute;
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 174px; height: 174px; object-fit: contain; pointer-events: none; z-index: 2;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.22));
    }

    /* ── Name ── */
    .particles-container { position: relative; z-index: 1; margin-bottom: 6px; min-height: 34px; }
    .profile-name {
      color: var(--text-primary);
      letter-spacing: 1px;
      font-size: 1.40rem;
      font-weight: 400;
      position: relative;
      z-index: 2;
      text-shadow: 0 0 10px rgba(255,255,255,0.22);
      min-height: 1.5em;
    }
    .typing-caret {
      display: inline-block;
      width: 1px;
      height: 1.1em;
      margin-left: 2px;
      background: currentColor;
      vertical-align: -0.15em;
      animation: caretBlink .82s steps(1) infinite;
      opacity: .75;
    }
    @keyframes caretBlink { 50% { opacity: 0; } }
    .particles {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 220px; height: 64px; opacity: .78; pointer-events: none;
      background: url('/sparkle.gif') center/contain no-repeat;
      filter: saturate(.95) brightness(1.05);
    }

    /* ── Role badge ── */
    .about {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 5px 14px;
      border-radius: 999px;
      background: var(--bio-tag-bg);
      border: 1px solid var(--bio-tag-border);
      color: var(--text-secondary);
      font-size: .80rem;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }
    .about-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: .5; flex-shrink: 0;
    }

    /* ═══════════════════════════════════
       BIO — redesigned
    ═══════════════════════════════════ */
    .bio-section {
      position: relative;
      z-index: 2;
      margin-top: 26px;
      padding-top: 22px;
    }

    /* thin hairline divider */
    .bio-section::before {
      content: "";
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 48px; height: 1px;
      background: var(--bio-divider);
    }

    /* big decorative opening quote */
    .bio-quote-mark {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 5rem;
      line-height: .6;
      color: var(--bio-quote-color);
      user-select: none;
      display: block;
      margin-bottom: 8px;
    }

    .bio-text {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: 1.07rem;
      line-height: 1.78;
      color: var(--text-secondary);
      text-wrap: balance;
      max-width: 420px;
      margin: 0 auto;
      letter-spacing: .08px;
    }

    /* highlighted phrase inside bio */
    .bio-em {
      font-style: normal;
      color: var(--text-primary);
      font-weight: 400;
      position: relative;
    }
    .bio-em::after {
      content: "";
      position: absolute;
      bottom: 1px; left: 0; right: 0;
      height: 1px;
      background: currentColor;
      opacity: .22;
    }

    /* attribution line */
    .bio-attribution {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      color: var(--text-soft);
      font-family: 'DM Sans', sans-serif;
      font-size: .75rem;
      letter-spacing: .8px;
      text-transform: uppercase;
    }
    .bio-attribution::before,
    .bio-attribution::after {
      content: "";
      width: 20px; height: 1px;
      background: currentColor; opacity: .35;
    }



    /* ── Social icons ── */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }
    .social-icons a {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--icon-bg); display: grid; place-items: center;
      text-decoration: none; transition: transform .18s ease, opacity .18s ease, filter .18s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }
    .social-icons a:hover { transform: translateY(-1px) scale(1.10); opacity: .92; }
    .social-icons svg { width: 17px; height: 17px; fill: var(--icon-color); }

    /* ── Bottom info ── */
    .bottom-left-info {
      position: absolute;
      left: 20px; bottom: 18px;
      display: flex; align-items: center; gap: 8px; z-index: 2;
    }
    .info-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); font-size: .82rem; }
    .info-item svg { width: 13px; height: 13px; fill: var(--text-secondary); }
    .separator { color: var(--text-secondary); opacity: .5; font-size: .9rem; }

    /* ── Music player ── */
    #player {
      width: min(580px, calc(100vw - 32px));
      border-radius: var(--player-radius);
      padding: 12px 16px;
      position: relative; overflow: hidden;
      display: flex; align-items: center; gap: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(18px) saturate(1.10);
      -webkit-backdrop-filter: blur(18px) saturate(1.10);
    }
    #player::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(145deg, var(--glass-highlight), transparent 55%, rgba(255,255,255,0.05));
      pointer-events: none;
    }
    #player-art {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.60); box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      animation: spin 8s linear infinite paused; position: relative; z-index: 1;
    }
    #player-art.playing { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .player-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .player-title {
      font-size: .95rem; font-weight: 500; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
    }
    .player-progress { display: flex; align-items: center; gap: 7px; }
    .player-time { font-size: .72rem; color: var(--text-secondary); font-variant-numeric: tabular-nums; flex-shrink: 0; min-width: 31px; }
    #progress-bar {
      flex: 1; height: 4px; border-radius: 999px; background: var(--progress-track);
      cursor: pointer; position: relative; overflow: hidden;
    }
    #progress-fill {
      height: 100%; border-radius: inherit; background: var(--progress-fill); width: 0%;
      transition: width .25s linear; pointer-events: none; box-shadow: 0 0 10px rgba(255,255,255,0.12);
    }
    .player-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; position: relative; z-index: 1; margin-left: 4px; }
    .ctrl-btn {
      border: none; cursor: pointer; display: grid; place-items: center; color: var(--text-primary);
      transition: transform .16s ease, opacity .16s ease, background .16s ease;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:hover { transform: translateY(-1px) scale(1.04); }
    .ctrl-btn:active { transform: translateY(0) scale(.98); }
    .ctrl-pill {
      width: 38px; height: 38px; border-radius: 999px;
      background: rgba(255,255,255,0.22); box-shadow: 0 6px 14px rgba(0,0,0,0.08), 0 1px 0 rgba(255,255,255,0.24) inset;
      border: 1px solid rgba(0,0,0,0.05);
    }
    html[data-theme="dark"] .ctrl-pill { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.08); }
    .ctrl-main {
      width: 46px; height: 46px; border-radius: 999px;
      background: linear-gradient(180deg, rgba(58,58,58,0.98), rgba(22,22,22,0.98));
      box-shadow: 0 10px 20px rgba(0,0,0,0.20), 0 1px 0 rgba(255,255,255,0.08) inset;
      border: 1px solid rgba(255,255,255,0.06); color: #fff;
    }
    html[data-theme="dark"] .ctrl-main { background: linear-gradient(180deg, rgba(245,245,245,0.96), rgba(220,220,220,0.96)); color: #111; }
    html[data-theme="light"] .ctrl-main { background: linear-gradient(180deg, rgba(176,176,176,0.98), rgba(136,136,136,0.98)); color: #f6f6f6; }
    html[data-theme="light"] .ctrl-pill { background: rgba(255,255,255,0.30); border-color: rgba(0,0,0,0.06); }
    .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; display: block; }
    .ctrl-main svg { width: 19px; height: 19px; }

    /* ── Vol btn overrides ── */
    #vol-btn {
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28)),
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.78), transparent 34%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.18), transparent 40%);
      border: 1px solid rgba(255,255,255,0.52);
      box-shadow:
        0 14px 30px rgba(0,0,0,0.14),
        0 1px 0 rgba(255,255,255,0.62) inset,
        0 -1px 0 rgba(255,255,255,0.18) inset;
      backdrop-filter: blur(18px) saturate(1.38);
      -webkit-backdrop-filter: blur(18px) saturate(1.38);
      overflow: hidden;
    }
    #vol-btn::before {
      content: "";
      position: absolute; inset: 1px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.48), rgba(255,255,255,0.08) 46%, rgba(255,255,255,0.02));
      pointer-events: none;
    }
    html[data-theme="dark"] #vol-btn {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.24), rgba(255,255,255,0.10)),
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.24), transparent 34%),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,0.08), transparent 40%);
      border-color: rgba(255,255,255,0.18);
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      html, body { overflow-x: hidden; overflow-y: auto; }
      body { align-items: flex-start; padding-top: 14px; }
      #card-wrap { width: 100%; padding: 16px; }
      .profile-box, #player { max-width: 100%; }
      .profile-box { padding: 28px 20px 54px; border-radius: 24px; }
      .profile-pic-wrapper, .profile-pic { width: 112px; height: 112px; }
      .profile-pic-decoration { width: 156px; height: 156px; }
      .bio-text { max-width: 100%; font-size: .98rem; }
      .social-icons { gap: 8px; }
      .social-icons a { width: 36px; height: 36px; }
      .bottom-left-info { left: 16px; bottom: 14px; }
      .corner-btn { width: 44px; height: 44px; border-radius: 15px; }
      #player { padding: 12px 12px; }
      .player-controls { gap: 6px; }
      .ctrl-pill { width: 36px; height: 36px; }
      .ctrl-main { width: 42px; height: 42px; }
      .profile-box { width: calc(100vw - 18px); }
      #player { width: calc(100vw - 18px); }
    }
  </style>
</head>
<body>
  <canvas id="snow-canvas"></canvas>

  <audio id="bgm" loop preload="auto" crossorigin="anonymous">
    <source src="/kwik.m4a" type="audio/mpeg" />
  </audio>

  <button class="corner-btn" id="vol-btn" title="Toggle mute" aria-label="Toggle mute">
    <svg id="vol-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
  </button>

  <button class="corner-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
    <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
  </button>

  <div id="overlay">enter...</div>

  <div id="card-wrap">
    <div class="profile-box">

      <!-- Avatar -->
      <div class="profile-pic-wrapper">
        <img src="/alex.png" alt="Profile" class="profile-pic" />
        <img src="/rose_white.png" alt="" aria-hidden="true" class="profile-pic-decoration" />
      </div>

      <!-- Name + particles -->
      <div class="particles-container">
        <div class="profile-name" id="profileName">
          <span id="typedName"></span><span class="typing-caret" aria-hidden="true"></span>
        </div>
        <div class="particles" aria-hidden="true"></div>
      </div>

      <!-- Role badge -->
      <div class="about"><span class="about-dot"></span>Web Dev</div>
      <div class="about"><span class="about-dot"></span>Anime</div>


      <!-- ══ BIO ══ -->
      <div class="bio-section">
        <span class="bio-quote-mark" aria-hidden="true">"</span>
        <p class="bio-text">
          Between the hush of clouds and the shimmer of snow,<br>
          I build things that feel like <span class="bio-em">places</span> — not pages.
        </p>

  <script>
  (() => {
    /* ── Snow ── */
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    const SHAPES = ['✦','✧','❄','✶','·','*'];
    const COUNT = 110;
    const flakes = [];
    function rand(a,b){return Math.random()*(b-a)+a;}
    for(let i=0;i<COUNT;i++) flakes.push({x:rand(0,window.innerWidth),y:rand(-50,window.innerHeight),size:rand(7,15),speed:rand(0.3,1.1),drift:rand(-0.25,0.25),opacity:rand(0.25,0.85),shape:SHAPES[Math.floor(Math.random()*SHAPES.length)],tw:rand(0,Math.PI*2)});
    function drawFlakes(){
      ctx.clearRect(0,0,W,H);
      for(const f of flakes){
        ctx.save();
        f.tw+=0.01;
        ctx.globalAlpha=Math.max(0.12,f.opacity*(0.7+Math.sin(f.tw)*0.3));
        ctx.fillStyle='#ffffff';
        ctx.font=`${f.size}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(f.shape,f.x,f.y);
        ctx.restore();
        f.y+=f.speed; f.x+=f.drift;
        if(f.y>H+20){f.y=-20;f.x=rand(0,W);}
        if(f.x<-20) f.x=W+20;
        if(f.x>W+20) f.x=-20;
      }
      requestAnimationFrame(drawFlakes);
    }
    drawFlakes();

    /* ── Audio ── */
    const bgm     = document.getElementById('bgm');
    const overlay = document.getElementById('overlay');
    const volBtn  = document.getElementById('vol-btn');
    const volIcon = document.getElementById('vol-icon');
    const themeBtn  = document.getElementById('theme-btn');
    const themeIcon = document.getElementById('theme-icon');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const iconPlay  = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const fill    = document.getElementById('progress-fill');
    const bar     = document.getElementById('progress-bar');
    const timeCur = document.getElementById('time-cur');
    const timeDur = document.getElementById('time-dur');
    const art     = document.getElementById('player-art');
    const typedName = document.getElementById('typedName');

    function unlockPage() {
      overlay.classList.add('hidden');
      bgm.play().catch(()=>{});
    }
    overlay.addEventListener('click', unlockPage);
    document.addEventListener('keydown', e => {
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); unlockPage(); }
    });

    bgm.src = '/kwik.m4a';
    bgm.load();

    let muted = false;
    const PATH_ON  = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM18.5 12c0 2.77-1.49 5.18-3.73 6.5l1.06 1.73A9.97 9.97 0 0 0 21 12c0-4.28-2.7-7.94-6.5-9.38L13.5 4.4C16.12 5.6 18.5 8.56 18.5 12z"/>`;
    const PATH_OFF = `<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.7-7.94-6.5-9.38L13.5 4.4C16.12 5.6 19 8.56 19 12zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3z"/>`;
    volBtn.addEventListener('click', ()=>{ muted=!muted; bgm.muted=muted; volIcon.innerHTML=muted?PATH_OFF:PATH_ON; });

    /* ══════════════════════════════════════
       TILT — lerp-based spring, no CSS snap
    ══════════════════════════════════════ */
    function applyTilt(el, maxDeg) {
      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      let rafId = null;
      let isHovered = false;

      const LERP_FOLLOW = 0.095;  // mouse-chase speed
      const LERP_RETURN = 0.052;  // slower ease-back on leave → the "recoil" feel

      function loop() {
        const lerp = isHovered ? LERP_FOLLOW : LERP_RETURN;
        currentX += (targetX - currentX) * lerp;
        currentY += (targetY - currentY) * lerp;

        const scale = isHovered ? 1.018 : 1;
        el.style.transform =
          `perspective(900px) rotateX(${currentX}deg) rotateY(${currentY}deg) scale(${scale})`;

        const dist = Math.abs(targetX - currentX) + Math.abs(targetY - currentY);
        if (dist > 0.008 || isHovered) {
          rafId = requestAnimationFrame(loop);
        } else {
          el.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) scale(1)';
          rafId = null;
        }
      }

      el.style.willChange = 'transform';
      el.style.transition  = 'none';

      el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        targetX = -y * maxDeg * 2;
        targetY =  x * maxDeg * 2;
        if (!rafId) rafId = requestAnimationFrame(loop);
      });

      el.addEventListener('mouseenter', () => {
        isHovered = true;
        if (!rafId) rafId = requestAnimationFrame(loop);
      });

      el.addEventListener('mouseleave', () => {
        isHovered = false;
        targetX = 0;
        targetY = 0;
        if (!rafId) rafId = requestAnimationFrame(loop);
      });
    }

    applyTilt(document.querySelector('.profile-box'), 12);
    applyTilt(document.getElementById('player'), 8);

    /* ── Player controls ── */
    const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    function setPlaying(p) {
      iconPlay.style.display  = p ? 'none' : '';
      iconPause.style.display = p ? '' : 'none';
      art.classList.toggle('playing', p);
    }
    bgm.addEventListener('timeupdate', () => {
      if(!bgm.duration) return;
      fill.style.width = (bgm.currentTime/bgm.duration*100)+'%';
      timeCur.textContent = fmt(bgm.currentTime);
    });
    bgm.addEventListener('loadedmetadata', () => { timeDur.textContent = fmt(bgm.duration||0); });
    bgm.addEventListener('canplay',  () => { overlay.textContent = 'enter...'; });
    bgm.addEventListener('error',    () => { overlay.textContent = 'audio load failed'; });
    bgm.addEventListener('play',     () => setPlaying(true));
    bgm.addEventListener('pause',    () => setPlaying(false));
    playBtn.addEventListener('click', () => bgm.paused ? bgm.play().catch(()=>{}) : bgm.pause());
    prevBtn.addEventListener('click', () => { bgm.currentTime = 0; });
    nextBtn.addEventListener('click', () => { if(bgm.duration) bgm.currentTime = bgm.duration; });
    bar.addEventListener('click', e => {
      if(!bgm.duration) return;
      const r = bar.getBoundingClientRect();
      bgm.currentTime = ((e.clientX-r.left)/r.width)*bgm.duration;
    });

    /* ── Typing loop ── */
    const namePhrase = '@ Alexander';
    let i = 2, deleting = false;
    function tick() {
      typedName.textContent = namePhrase.slice(0,i);
      document.title = namePhrase.slice(0,i);
      if(!deleting){
        i++;
        if(i>namePhrase.length){ deleting=true; setTimeout(tick,900); return; }
      } else {
        i--;
        if(i<2){ deleting=false; setTimeout(tick,500); return; }
      }
      setTimeout(tick, deleting?70:120);
    }
    typedName.textContent='@ A';
    document.title='@ A';
    setTimeout(tick,260);

    document.documentElement.dataset.theme = 'dark';

    const SVG_MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
    const updateThemeIcon = () => {
      const isDark = document.documentElement.dataset.theme === 'dark';
      // dark mode → show moon, light mode → show sun
      themeIcon.innerHTML = isDark ? SVG_MOON : SVG_SUN;
    };
    updateThemeIcon();
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = isDark ? 'light' : 'dark';
      updateThemeIcon();
    });

    bgm.volume = 1;
    setPlaying(false);
    timeCur.textContent = '0:00';
    timeDur.textContent = '0:00';
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
  })();
  </script>
