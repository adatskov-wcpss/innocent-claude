name: Fetch File

on:
  push:
    paths:
      - 'config/fetch-url.txt'

permissions:
  contents: write

jobs:
  fetch-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read and Validate URL
        id: validate
        run: |
          URL=$(cat config/fetch-url.txt | tr -d '[:space:]')
          echo "Fetching: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download File
        run: |
          URL="${{ steps.validate.outputs.url }}"
          cd config/
          curl -L -O "$URL"
          
          # Get the downloaded file (most recent)
          FILE=$(ls -t | grep -v 'fetch-url.txt' | head -1)
          MIME=$(file --mime-type -b "$FILE")
          echo "Downloaded: $FILE ($MIME)"
          
          # Allow image/* and text/code types
          if [[ "$MIME" =~ ^image/ ]] || \
             [[ "$MIME" =~ ^text/ ]] || \
             [[ "$MIME" == "application/javascript" ]] || \
             [[ "$MIME" == "application/json" ]] || \
             [[ "$MIME" == "application/xml" ]] || \
             [[ "$MIME" == "application/x-httpd-php" ]] || \
             [[ "$MIME" == "application/wasm" ]]; then
            echo "✅ File type allowed: $MIME"
          else
            echo "❌ File type not allowed: $MIME"
            rm "$FILE"
            exit 1
          fi

      - name: Commit File
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config/
          git commit -m "chore: fetched $(cat config/fetch-url.txt | tr -d '[:space:]' | xargs basename) [skip ci]" || echo "No changes"
          git push
